{
  "wireplumber.settings": {
    "device.routes.default-source-volume": 1
  },
  "monitor.alsa.rules": [
    {
      "matches": [
        { "node.name": "Audient iD4 XLR Microphone output" }
      ],
      "actions": {
        "update-props": {
          "priority.driver": 99,
          "priority.session": 99
        }
      }
    }
  ]
}
