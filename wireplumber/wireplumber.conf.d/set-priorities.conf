monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "alsa_output.usb-Audient_Audient_iD4-00.HiFi__Headphones__sink"
      }
    ]
    actions = {
      update-props = {
        priority.driver = 100
        priority.session = 100
      }
    }
  },
  {
    matches = [
      {
        node.name = "alsa_output.usb-Audient_Audient_iD4-00.HiFi__Speaker__sink"
      }
    ]
    actions = {
      update-props = {
        priority.driver = 99
        priority.session = 99
      }
    }
  }
]
